<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#102318" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;600;700;800&family=Inter:wght@500;600;700;800&family=Orbitron:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Pife Duelo V1</title>
  </head>
  <body>
    <div id="root">
      <main class="startup-error">
        <strong>Carregando Pife Duelo...</strong>
        <span>Se esta mensagem nao sair, recarregue a pagina ou reinicie o servidor.</span>
      </main>
    </div>
    <script>
      window.setTimeout(function () {
        if (window.__PIFE_DUELO_BOOTED__) return;
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = '<main class="startup-error"><strong>Pife Duelo nao iniciou</strong><span>O script principal nao carregou. Recarregue a pagina.</span></main>';
      }, 5000);
    </script>
    <script type="module">
      import '/src/main.jsx';
    </script>
  </body>
</html>
